<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報名成功 - TCU Criterium</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: white;
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    .success-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      animation: scaleIn 0.5s ease-out;
    }
    
    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 1rem;
    }

    .subtitle {
      color: #666;
      font-size: 16px;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .info-card {
      background: #f8f9fa;
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid #e9ecef;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #666;
      font-size: 14px;
      font-weight: 600;
    }

    .info-value {
      color: #333;
      font-size: 14px;
      font-weight: 500;
    }

    .highlight {
      color: #667eea;
      font-weight: 700;
    }

    .notice-box {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 1rem;
      border-radius: 8px;
      margin: 1.5rem 0;
      text-align: left;
    }

    .notice-box strong {
      color: #856404;
      display: block;
      margin-bottom: 0.5rem;
    }

    .notice-box p {
      color: #856404;
      font-size: 13px;
      line-height: 1.6;
      margin: 0.25rem 0;
    }

    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #5a6268;
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 2px solid #f0f0f0;
      color: #999;
      font-size: 13px;
    }

    .loading {
      text-align: center;
      padding: 3rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-icon {
      font-size: 50px;
      color: #dc3545;
    }
  </style>
</head>
<body>
  <div class="container" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>正在載入訂單資訊...</p>
    </div>
  </div>

  <script>
    const CONFIG = {
      // 查詢訂單狀態的 API（可選）
      checkOrderUrl: 'https://service.criterium.tw/webhook/check-order-status'
    };

    // 從 URL 參數取得資訊
    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        orderNo: params.get('MerchantTradeNo') || params.get('order_no'),
        rtnCode: params.get('RtnCode'),
        rtnMsg: params.get('RtnMsg'),
        tradeNo: params.get('TradeNo'),
        tradeAmt: params.get('TradeAmt'),
        paymentDate: params.get('PaymentDate'),
        paymentType: params.get('PaymentType'),
        // 自訂欄位
        name: params.get('CustomField1'),
        email: params.get('CustomField2'),
        phone: params.get('CustomField3'),
        category: params.get('CustomField4')
      };
    }

    // 顯示成功頁面
    function showSuccess(data) {
      const categoryNames = {
        'pro': '菁英組',
        'amateur': '業餘組',
        'junior': '青少年組'
      };

      const paymentTypeNames = {
        'Credit_CreditCard': '信用卡',
        'ATM_LAND': 'ATM 轉帳',
        'CVS_CVS': '超商代碼',
        'BARCODE_BARCODE': '超商條碼'
      };

      document.getElementById('content').innerHTML = `
        <div class="success-icon">✓</div>
        
        <h1>🎉 報名成功！</h1>
        <p class="subtitle">
          感謝您報名 TCU Criterium 賽事<br>
          付款已完成，我們已收到您的報名資料
        </p>

        <div class="info-card">
          <div class="info-row">
            <span class="info-label">訂單編號</span>
            <span class="info-value highlight">${data.orderNo || '-'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">報名者</span>
            <span class="info-value">${data.name || '-'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">參賽組別</span>
            <span class="info-value">${categoryNames[data.category] || data.category || '-'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">付款金額</span>
            <span class="info-value highlight">NT$ ${data.tradeAmt ? parseInt(data.tradeAmt).toLocaleString() : '-'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">付款方式</span>
            <span class="info-value">${paymentTypeNames[data.paymentType] || data.paymentType || '-'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">付款時間</span>
            <span class="info-value">${data.paymentDate || '-'}</span>
          </div>
        </div>

        <div class="notice-box">
          <strong>📧 重要通知</strong>
          <p>• 報名確認信已寄送至您的信箱：<strong>${data.email || '-'}</strong></p>
          <p>• 請檢查信箱（包含垃圾郵件夾）</p>
          <p>• 賽前一週將寄送詳細賽事資訊</p>
          <p>• 如有任何問題，請聯繫主辦單位</p>
        </div>

        <div class="actions">
          <a href="https://strava.criterium.tw/event.html" class="btn btn-secondary">
            返回活動頁面
          </a>
          <a href="javascript:window.print()" class="btn btn-primary">
            列印收據
          </a>
        </div>

        <div class="footer">
          訂單編號：${data.orderNo || '-'}<br>
          如需協助請聯繫：info@criterium.tw
        </div>
      `;
    }

    // 顯示錯誤頁面
    function showError(message) {
      document.getElementById('content').innerHTML = `
        <div class="success-icon" style="background: #dc3545;">
          <span class="error-icon">✗</span>
        </div>
        
        <h1>❌ 付款失敗</h1>
        <p class="subtitle">
          很抱歉，您的付款未能成功完成<br>
          ${message || '請重新嘗試或聯繫客服人員'}
        </p>

        <div class="notice-box" style="background: #f8d7da; border-color: #dc3545;">
          <strong style="color: #721c24;">可能原因</strong>
          <p style="color: #721c24;">• 付款過程中斷</p>
          <p style="color: #721c24;">• 信用卡資訊不正確</p>
          <p style="color: #721c24;">• 超過付款時限</p>
          <p style="color: #721c24;">• 系統處理異常</p>
        </div>

        <div class="actions">
          <a href="https://strava.criterium.tw/eventregister.html" class="btn btn-primary">
            重新報名
          </a>
          <a href="mailto:info@criterium.tw" class="btn btn-secondary">
            聯繫客服
          </a>
        </div>

        <div class="footer">
          如需協助請聯繫：info@criterium.tw
        </div>
      `;
    }

    // 顯示待繳費頁面（ATM/超商）
    function showPending(data) {
      document.getElementById('content').innerHTML = `
        <div class="success-icon" style="background: #ffc107;">⏳</div>
        
        <h1>⏰ 等待付款中</h1>
        <p class="subtitle">
          您的訂單已建立，請儘速完成繳費
        </p>

        <div class="info-card">
          <div class="info-row">
            <span class="info-label">訂單編號</span>
            <span class="info-value highlight">${data.orderNo || '-'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">報名者</span>
            <span class="info-value">${data.name || '-'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">應繳金額</span>
            <span class="info-value highlight">NT$ ${data.tradeAmt ? parseInt(data.tradeAmt).toLocaleString() : '-'}</span>
          </div>
        </div>

        <div class="notice-box">
          <strong>💡 繳費說明</strong>
          <p>• 繳費資訊已寄送至您的信箱</p>
          <p>• 請於期限內完成繳費</p>
          <p>• 完成繳費後約需 2-3 小時處理時間</p>
          <p>• 如有問題請聯繫客服</p>
        </div>

        <div class="actions">
          <a href="https://strava.criterium.tw/event.html" class="btn btn-secondary">
            返回活動頁面
          </a>
        </div>

        <div class="footer">
          訂單編號：${data.orderNo || '-'}<br>
          如需協助請聯繫：info@criterium.tw
        </div>
      `;
    }

    // 初始化頁面
    async function init() {
      const params = getUrlParams();
      
      console.log('URL 參數:', params);

      // 判斷付款狀態
      if (params.rtnCode === '1') {
        // 付款成功
        showSuccess(params);
      } else if (params.rtnCode && params.rtnCode !== '1') {
        // 付款失敗
        showError(params.rtnMsg || '付款處理失敗');
      } else if (params.orderNo) {
        // 可能是 ATM/超商等待付款
        // 可以選擇呼叫 API 查詢訂單狀態
        try {
          const response = await fetch(`${CONFIG.checkOrderUrl}?order_no=${params.orderNo}`);
          if (response.ok) {
            const orderData = await response.json();
            if (orderData.status === 'paid') {
              showSuccess(orderData);
            } else {
              showPending(orderData);
            }
          } else {
            showPending(params);
          }
        } catch (error) {
          console.error('查詢訂單狀態失敗:', error);
          showPending(params);
        }
      } else {
        // 沒有任何參數
        showError('找不到訂單資訊');
      }
    }

    // 頁面載入時執行
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
