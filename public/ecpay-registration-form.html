
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCU Criterium - 賽事報名（綠界金流）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #333;
      margin-bottom: 0.5rem;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 2rem;
      font-size: 14px;
    }

    .price-info {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      text-align: center;
    }
    .price-amount {
      font-size: 36px;
      font-weight: bold;
      margin: 0.5rem 0;
    }
    .price-label {
      font-size: 14px;
      opacity: 0.9;
    }

    .form-section {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 2px solid #f0f0f0;
    }
    .form-section:last-of-type {
      border-bottom: none;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-group { margin-bottom: 1.5rem; }
    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 14px;
    }
    label .required { color: #dc3545; }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .input-hint { font-size: 12px; color: #6c757d; margin-top: 0.25rem; }

    .payment-methods {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .payment-method {
      position: relative;
    }
    .payment-method input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .payment-method label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      border: 2px solid #e9ecef;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      height: 100%;
    }
    .payment-method input[type="radio"]:checked + label {
      border-color: #667eea;
      background: #f0f4ff;
    }
    .payment-icon {
      font-size: 32px;
      margin-bottom: 0.5rem;
    }
    .payment-name {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .terms {
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 13px;
      line-height: 1.6;
      color: #666;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .checkbox-group input[type="checkbox"] {
      width: auto;
      cursor: pointer;
    }
    .checkbox-group label {
      margin-bottom: 0;
      cursor: pointer;
      font-weight: normal;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }
    .btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; 
    }
    .btn-primary:hover:not(:disabled) { 
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    .btn-primary:disabled { 
      background: #ccc; 
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:hover { background: #5a6268; }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      display: none;
      font-size: 14px;
      animation: slideDown 0.3s;
    }
    .message.show { display: block; }
    .success-message {
      background: #d4edda;
      border: 2px solid #28a745;
      color: #155724;
    }
    .error-message {
      background: #f8d7da;
      border: 2px solid #dc3545;
      color: #721c24;
    }

    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .loading-overlay.show {
      display: flex;
    }
    .loading-content {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      text-align: center;
      max-width: 400px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #ecpayForm { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚴 TCU Criterium 賽事報名</h1>
    <p class="subtitle">請填寫以下資訊並完成付款</p>

    <div id="successMessage" class="message success-message"></div>
    <div id="errorMessage" class="message error-message"></div>

    <div class="price-info">
      <div class="price-label">報名費用</div>
      <div class="price-amount" id="priceDisplay">NT$ 1,500</div>
      <div class="price-label">線上刷卡/超商付款/ATM轉帳</div>
    </div>

    <form id="registrationForm" onsubmit="handleSubmit(event)">
      <!-- 基本資料 -->
      <div class="form-section">
        <div class="section-title">
          <span>👤</span>
          <span>基本資料</span>
        </div>
        <div class="form-group">
          <label>姓名 <span class="required">*</span></label>
          <input type="text" id="name" name="name" required placeholder="請輸入真實姓名">
        </div>
        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" required placeholder="example@email.com">
          <div class="input-hint">繳費資訊與報名確認將寄送至此信箱</div>
        </div>
        <div class="form-group">
          <label>手機號碼 <span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" required placeholder="0912-345-678" pattern="[0-9]{10}">
        </div>
        <div class="form-group">
          <label>性別 <span class="required">*</span></label>
          <select id="gender" name="gender" required>
            <option value="">請選擇</option>
            <option value="M">男性</option>
            <option value="F">女性</option>
          </select>
        </div>
      </div>

      <!-- 賽事資訊 -->
      <div class="form-section">
        <div class="section-title">
          <span>🏆</span>
          <span>賽事資訊</span>
        </div>
        <div class="form-group">
          <label>參賽組別 <span class="required">*</span></label>
          <select id="category" name="category" required onchange="updatePrice()">
            <option value="">請選擇</option>
            <option value="pro" data-price="1500">菁英組 - NT$ 1,500</option>
            <option value="amateur" data-price="1200">業餘組 - NT$ 1,200</option>
            <option value="junior" data-price="800">青少年組 - NT$ 800</option>
          </select>
        </div>
        <div class="form-group">
          <label>衣服尺寸</label>
          <select id="shirt_size" name="shirt_size">
            <option value="">請選擇</option>
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
            <option value="2XL">2XL</option>
          </select>
        </div>
      </div>

      <!-- 緊急聯絡人 -->
      <div class="form-section">
        <div class="section-title">
          <span>🚨</span>
          <span>緊急聯絡人</span>
        </div>
        <div class="form-group">
          <label>緊急聯絡人姓名 <span class="required">*</span></label>
          <input type="text" id="emergency_contact" name="emergency_contact" required placeholder="姓名">
        </div>
        <div class="form-group">
          <label>緊急聯絡電話 <span class="required">*</span></label>
          <input type="tel" id="emergency_phone" name="emergency_phone" required placeholder="0912-345-678" pattern="[0-9]{10}">
        </div>
      </div>

      <!-- 付款方式 -->
      <div class="form-section">
        <div class="section-title">
          <span>💳</span>
          <span>付款方式</span>
        </div>
        <div class="payment-methods">
          <div class="payment-method">
            <input type="radio" id="payment_credit" name="payment_method" value="Credit" checked>
            <label for="payment_credit">
              <div class="payment-icon">💳</div>
              <div class="payment-name">信用卡</div>
            </label>
          </div>
          <div class="payment-method">
            <input type="radio" id="payment_atm" name="payment_method" value="ATM">
            <label for="payment_atm">
              <div class="payment-icon">🏦</div>
              <div class="payment-name">ATM 轉帳</div>
            </label>
          </div>
          <div class="payment-method">
            <input type="radio" id="payment_cvs" name="payment_method" value="CVS">
            <label for="payment_cvs">
              <div class="payment-icon">🏪</div>
              <div class="payment-name">超商代碼</div>
            </label>
          </div>
          <div class="payment-method">
            <input type="radio" id="payment_barcode" name="payment_method" value="BARCODE">
            <label for="payment_barcode">
              <div class="payment-icon">📱</div>
              <div class="payment-name">超商條碼</div>
            </label>
          </div>
        </div>
      </div>

      <!-- 備註 -->
      <div class="form-section">
        <div class="form-group">
          <label>備註</label>
          <textarea id="notes" name="notes" rows="3" placeholder="其他需要說明的事項..."></textarea>
        </div>
      </div>

      <!-- 同意條款 -->
      <div class="terms">
        <strong>重要須知：</strong><br>
        • 報名費用包含參賽資格、號碼布、完賽紀念品及保險<br>
        • 報名後若因個人因素無法參賽，恕不退費<br>
        • 如因天候等不可抗力因素取消賽事，將扣除行政費用後退還50%費用<br>
        • 完成付款後，報名資料將無法修改
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="agree_terms" required>
        <label for="agree_terms">我已詳閱並同意上述條款及<a href="privacy-policy.html" target="_blank">隱私權政策</a> <span class="required">*</span></label>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" onclick="resetForm()">
          重設表單
        </button>
        <button type="submit" class="btn btn-primary" id="submitBtn">
          前往付款 →
        </button>
      </div>
    </form>
  </div>

  <!-- 載入中遮罩 -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <h3>正在處理訂單...</h3>
      <p>請稍候，即將前往付款頁面</p>
    </div>
  </div>

  <!-- 綠界付款表單（隱藏，用於自動提交） -->
  <form id="ecpayForm" method="post" action="https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5">
    <!-- 將由後端動態填入 -->
  </form>

  <script>
    const CONFIG = {
      // 修改為你的 n8n webhook URL
      createOrderUrl: 'https://service.criterium.tw/webhook/ecpay-create-order',
      // 測試環境：https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5
      // 正式環境：https://payment.ecpay.com.tw/Cashier/AioCheckOut/V5
      ecpayUrl: 'https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5'
    };

    let currentPrice = 1500;

    function updatePrice() {
      const categorySelect = document.getElementById('category');
      const selectedOption = categorySelect.options[categorySelect.selectedIndex];
      const price = selectedOption.getAttribute('data-price');
      
      if (price) {
        currentPrice = parseInt(price);
        document.getElementById('priceDisplay').textContent = `NT$ ${currentPrice.toLocaleString()}`;
      }
    }

    function showMessage(type, message) {
      const messageEl = document.getElementById(type === 'success' ? 'successMessage' : 'errorMessage');
      messageEl.textContent = (type === 'error' ? '❌ ' : '✅ ') + message;
      messageEl.classList.add('show');
      
      setTimeout(() => {
        messageEl.classList.remove('show');
      }, 5000);
    }

    function showLoading(show) {
      document.getElementById('loadingOverlay').classList.toggle('show', show);
    }

    async function handleSubmit(event) {
      event.preventDefault();
      
      const formData = new FormData(event.target);
      const data = Object.fromEntries(formData.entries());
      
      // 加入價格資訊
      data.amount = currentPrice;
      
      console.log('提交表單資料:', data);
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      showLoading(true);

      try {
        // 呼叫 n8n webhook 建立訂單
        const response = await fetch(CONFIG.createOrderUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        console.log('回應狀態:', response.status);

        if (response.ok) {
          const result = await response.json();
          console.log('訂單建立成功:', result);

          // 檢查是否有付款表單參數
          if (result.ecpay_form) {
            // 動態建立綠界付款表單
            const ecpayForm = document.getElementById('ecpayForm');
            ecpayForm.innerHTML = ''; // 清空
            ecpayForm.action = result.ecpay_form.action || CONFIG.ecpayUrl;

            // 填入所有參數
            Object.keys(result.ecpay_form.params).forEach(key => {
              const input = document.createElement('input');
              input.type = 'hidden';
              input.name = key;
              input.value = result.ecpay_form.params[key];
              ecpayForm.appendChild(input);
            });

            // 自動提交到綠界
            setTimeout(() => {
              console.log('自動提交到綠界付款頁面');
              ecpayForm.submit();
            }, 1000);

          } else {
            throw new Error('未收到付款表單資訊');
          }

        } else {
          const errorText = await response.text();
          console.error('建立訂單失敗:', errorText);
          
          let errorMessage = '訂單建立失敗';
          try {
            const errorData = JSON.parse(errorText);
            errorMessage = errorData.message || errorData.error || errorMessage;
          } catch (e) {
            errorMessage = errorText || errorMessage;
          }
          
          throw new Error(errorMessage);
        }

      } catch (error) {
        console.error('提交錯誤:', error);
        showMessage('error', error.message || '提交失敗，請稍後再試');
        showLoading(false);
        submitBtn.disabled = false;
      }
    }

    function resetForm() {
      if (confirm('確定要重設表單嗎？')) {
        document.getElementById('registrationForm').reset();
        currentPrice = 1500;
        document.getElementById('priceDisplay').textContent = 'NT$ 1,500';
        document.getElementById('successMessage').classList.remove('show');
        document.getElementById('errorMessage').classList.remove('show');
      }
    }

    // 頁面載入時初始化
    window.addEventListener('DOMContentLoaded', function() {
      console.log('報名系統已載入');
      
      // 電話號碼格式化
      const phoneInputs = document.querySelectorAll('input[type="tel"]');
      phoneInputs.forEach(input => {
        input.addEventListener('input', function(e) {
          // 只保留數字
          this.value = this.value.replace(/\D/g, '');
        });
      });
    });
  </script>
</body>
</html>
