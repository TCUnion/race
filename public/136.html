<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCU 136檢定</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
      min-height: 100vh;
      padding: 2rem;
    }

    .tsu-banner {
      width: 100%;
      background: rgba(0, 0, 0, 0.95);
      padding: 12px 24px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 24px;
    }

    .tsu-banner img {
      height: 40px;
      width: auto;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 2px solid #f0f0f0;
    }

    h1 {
      color: #333;
      margin-bottom: 0.5rem;
      font-size: 32px;
      font-weight: 700;
    }

    .subtitle {
      color: #666;
      font-size: 15px;
      line-height: 1.6;
    }

    .privacy-link {
      color: #667eea;
      text-decoration: underline;
      font-weight: 600;
    }

    .privacy-link:hover {
      color: #764ba2;
    }

    /* 修正: Strava 整合區塊 */
    .strava-section {
      background: #f8f9fa;
      padding: 2rem;
      border-radius: 16px;
      margin-bottom: 2rem;
      border: 2px solid #e9ecef;
      text-align: center;
    }

    .strava-section-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.5rem;
    }

    .strava-section-desc {
      font-size: 14px;
      color: #6c757d;
      margin-bottom: 1.5rem;
    }

    .strava-status {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .strava-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .strava-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid #FC5200;
      object-fit: cover;
    }

    .strava-details {
      text-align: left;
    }

    .strava-name {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 4px;
      color: #333;
    }

    .strava-id {
      font-size: 13px;
      color: #6c757d;
    }

    /* 修正: Connect with Strava 按鈕 - 使用官方圖片 */
    .btn-connect-strava {
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-block;
      line-height: 0;
    }

    .btn-connect-strava img {
      display: block;
      height: 48px;
      width: auto;
    }

    .btn-connect-strava:hover:not(:disabled) {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .btn-connect-strava:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* 修正: Powered by Strava 標誌 */
    .powered-by-strava {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 1rem;
    }

    .strava-logo {
      height: 32px;
      width: auto;
      display: block;
    }

    .btn-disconnect {
      background: transparent;
      color: #6c757d;
      border: 2px solid #e9ecef;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.5rem;
    }

    .btn-disconnect:hover:not(:disabled) {
      border-color: #dc3545;
      color: #dc3545;
      background: #fff5f5;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 14px;
    }

    .required {
      color: #dc3545;
    }

    input,
    textarea {
      width: 100%;
      padding: 14px;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    input:disabled {
      background: #f8f9fa;
      color: #6c757d;
      cursor: not-allowed;
    }

    .input-hint {
      font-size: 12px;
      color: #6c757d;
      margin-top: 0.25rem;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #5a6268;
      transform: translateY(-2px);
    }

    .message {
      padding: 16px 20px;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      display: none;
      font-size: 15px;
      font-weight: 600;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.show {
      display: block;
    }

    .success-message {
      background: #d4edda;
      border-left: 4px solid #28a745;
      color: #155724;
    }

    .error-message {
      background: #f8d7da;
      border-left: 4px solid #dc3545;
      color: #721c24;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .info-block {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      border-radius: 8px;
      padding: 16px;
      font-size: 14px;
      color: #495057;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .challenge-badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
    }

    .view-on-strava {
      color: #FC5200;
      text-decoration: underline;
      font-weight: 700;
      font-size: 14px;
    }

    .view-on-strava:hover {
      color: #E04700;
    }

    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .container {
        padding: 2rem 1.5rem;
      }

      h1 {
        font-size: 26px;
      }

      .form-actions {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="tsu-banner">
    <a href="https://www.tsu.com.tw/" target="_blank" rel="noopener noreferrer">
      <img src="https://www.tsu.com.tw/images/logo.png" alt="TCU Logo">
    </a>
  </div>

  <div class="container">
    <div class="header">
      <h1>TCU 136檢定<span class="challenge-badge">大挑戰</span></h1>
      <p class="subtitle">
        授權資料僅供TCU內部使用,並保證不對外使用<br>
        <a href="/privacy-policy.html" class="privacy-link" target="_blank" rel="noopener noreferrer">
          查看完整隱私政策與資料使用說明
        </a>
      </p>
    </div>

    <div id="successMessage" class="message success-message"></div>
    <div id="errorMessage" class="message error-message"></div>

    <!-- 修正: Strava 整合區塊 -->
    <div class="strava-section">
      <div class="strava-section-title">🚴 運動數據整合</div>
      <div class="strava-section-desc">授權後可自動同步您的 Strava 運動數據 (Powered by Strava)</div>

      <div id="stravaStatus" class="strava-status">
        <button class="btn-connect-strava" type="button" onclick="connectStrava()">
          <img src="/btn_strava_connect_with_orange_x2.png" alt="Connect with Strava" height="48">
        </button>

        <div class="powered-by-strava">
          <img src="/logo_pwrdBy_strava_horiz_orange.png" alt="Powered by Strava" class="strava-logo">
        </div>
      </div>
    </div>

    <div class="info-block">
      <strong>📢 測試說明</strong><br>
      這是TCU針對後續釋出讓大家都可以用 Strava 辦比賽的測試功能。<br>
      請先授權您的 Strava 帳號,系統將自動同步您的運動數據用於136檢定。
    </div>

    <form id="registrationForm" onsubmit="handleSubmit(event)">
      <input type="hidden" id="strava_athlete_id" name="strava_athlete_id">
      <input type="hidden" id="strava_username" name="strava_username">
      <input type="hidden" id="strava_profile" name="strava_profile">

      <div class="form-group">
        <label>TCU-ID / 個人身份證ID (選填)</label>
        <input type="text" id="tcu_id" name="tcu_id" placeholder="TCU-zvnrqonh9coqy4kp 或身份證 A123456789"
          autocomplete="off">
        <div class="input-hint">請輸入您的TCU會員ID或身份證字號後可同步TCU個人資料。若不同步,填寫姓名跟號碼即可</div>
      </div>

      <div class="form-group">
        <label>姓名 <span class="required">*</span></label>
        <input type="text" id="name" name="name" placeholder="授權 Strava 或同步 TCU 後自動帶入" autocomplete="name" required>
        <div class="input-hint">授權 Strava 或同步 TCU 後將自動填入您的姓名</div>
      </div>

      <div class="form-group">
        <label>車隊</label>
        <input type="text" id="team" name="team" placeholder="同步TCU後自動帶入" autocomplete="team">
        <div class="input-hint">選填:您所屬的車隊或俱樂部</div>
      </div>

      <div class="form-group">
        <label>號碼 <span class="required">*</span></label>
        <input type="text" id="number" name="number" placeholder="請輸入您的號碼" autocomplete="off" required>
        <div class="input-hint">必填:您的參賽號碼</div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" onclick="syncTCUData()">
          同步TCU個人資料
        </button>
        <button type="submit" class="btn btn-primary" id="submitBtn">
          完成資料填寫
        </button>
      </div>
    </form>
  </div>

  <script>
    const CONFIG = {
      stravaAuthUrl: 'https://service.criterium.tw/webhook/strava/auth/start',
      submitUrl: 'https://service.criterium.tw/webhook/136submit',
      tcuSyncUrl: 'https://service.criterium.tw/webhook/tcu-sync',
      stravaCancelUrl: 'https://service.criterium.tw/webhook/strava/auth/cancel',
      allowedOrigins: [
        'https://service.criterium.tw',
        'https://strava.criterium.tw',
        'https://race.criterium.tw',
        'https://strava.criterium.tw',
        'https://tcu.criterium.tw',
        'https://www.criterium.tw',
        'https://criterium.tw'
      ],
      storageKey: 'strava_athlete_meta',
      pollingInterval: 1000,
      pollingTimeout: 120000
    };

    let authWindow = null;
    let pollingTimer = null;
    let pollingStartTime = null;

    function showMessage(type, message) {
      const messageEl = document.getElementById(type === 'success' ? 'successMessage' : 'errorMessage');
      const otherEl = document.getElementById(type === 'success' ? 'errorMessage' : 'successMessage');

      if (otherEl) {
        otherEl.classList.remove('show');
        otherEl.textContent = '';
      }

      if (message) {
        messageEl.textContent = (type === 'error' ? '❌ ' : '✅ ') + message;
      }
      messageEl.classList.add('show');

      setTimeout(() => {
        messageEl.classList.remove('show');
      }, 5000);
    }

    function saveFormState() {
      try {
        const formData = new FormData(document.getElementById('registrationForm'));
        const data = Object.fromEntries(formData.entries());
        sessionStorage.setItem('form_state', JSON.stringify(data));
      } catch (err) {
        console.warn('無法儲存表單狀態:', err);
      }
    }

    function loadFormState() {
      const savedState = sessionStorage.getItem('form_state');
      if (savedState) {
        try {
          const data = JSON.parse(savedState);
          Object.keys(data).forEach(key => {
            const input = document.getElementById(key);
            if (input && data[key]) {
              input.value = data[key];
            }
          });
          sessionStorage.removeItem('form_state');
        } catch (error) {
          console.error('載入表單狀態失敗:', error);
        }
      }
    }

    function fillFormWithStravaData(athlete) {
      if (!athlete || !athlete.id) return;

      document.getElementById('strava_athlete_id').value = athlete.id || '';
      document.getElementById('strava_username').value = athlete.username || '';
      document.getElementById('strava_profile').value = athlete.profile || athlete.profile_medium || '';

      const firstName = athlete.firstname || athlete.firstName || '';
      const lastName = athlete.lastname || athlete.lastName || '';
      const fullName = (firstName + ' ' + lastName).trim();

      const nameInput = document.getElementById('name');
      if (fullName && nameInput && !nameInput.value) {
        nameInput.value = fullName;
      }

      updateStravaStatus(athlete);

      // ✅ 儲存完整的 athlete 資料,包含 access_token
      try {
        const athleteData = {
          id: athlete.id,
          username: athlete.username || '',
          firstname: athlete.firstname || athlete.firstName || '',
          lastname: athlete.lastname || athlete.lastName || '',
          profile: athlete.profile || athlete.profile_medium || '',
          profile_medium: athlete.profile_medium || athlete.profile || '',
          access_token: athlete.access_token || '',
          ts: Date.now()
        };
        localStorage.setItem(CONFIG.storageKey, JSON.stringify(athleteData));
      } catch (e) {
        console.warn('無法寫入 localStorage:', e);
      }
    }

    function updateStravaStatus(athlete) {
      const statusEl = document.getElementById('stravaStatus');
      if (!statusEl) return;

      if (athlete && athlete.id) {
        const avatarHtml = (athlete.profile_medium || athlete.profile)
          ? `<img src="${athlete.profile_medium || athlete.profile}" class="strava-avatar" alt="Profile">`
          : '';

        const firstName = athlete.firstname || athlete.firstName || '';
        const lastName = athlete.lastname || athlete.lastName || '';
        const username = athlete.username || '';
        const displayName = (firstName || lastName)
          ? `${firstName} ${lastName}`.trim()
          : (username || `運動員 ${athlete.id}`);

        statusEl.innerHTML = `
          <div class="strava-info">
            ${avatarHtml}
            <div class="strava-details">
              <div class="strava-name">✅ ${displayName}</div>
              <div class="strava-id">Athlete ID: ${athlete.id}</div>
            </div>
          </div>
          <button class="btn-disconnect" type="button" onclick="disconnectStrava()">取消授權</button>
          <div class="powered-by-strava">
            <img src="/logo_pwrdBy_strava_horiz_orange.png" 
                 alt="Powered by Strava" 
                 class="strava-logo">
          </div>
        `;
      } else {
        statusEl.innerHTML = `
          <button class="btn-connect-strava" type="button" onclick="connectStrava()">
            <img src="/btn_strava_connect_with_orange_x2.png" 
                 alt="Connect with Strava" 
                 height="48">
          </button>
          <div class="powered-by-strava">
            <img src="/logo_pwrdBy_strava_horiz_orange.png" 
                 alt="Powered by Strava" 
                 class="strava-logo">
          </div>
        `;
      }
    }

    function updateStravaStatusLoading() {
      const statusEl = document.getElementById('stravaStatus');
      if (!statusEl) return;

      statusEl.innerHTML = `
        <div class="strava-section-desc">
          <span class="spinner"></span>授權處理中,請在彈出視窗中完成授權...
        </div>
        <button class="btn-connect-strava" type="button" disabled>
          <img src="/btn_strava_connect_with_orange_x2.png" 
               alt="Connect with Strava" 
               height="48"
               style="opacity: 0.6;">
        </button>
        <div class="powered-by-strava">
          <img src="/logo_pwrdBy_strava_horiz_orange.png" 
               alt="Powered by Strava" 
               class="strava-logo">
        </div>
      `;
    }

    function connectStrava() {
      saveFormState();
      if (pollingTimer) clearInterval(pollingTimer);
      updateStravaStatusLoading();

      try {
        localStorage.removeItem(CONFIG.storageKey + '_temp');
      } catch (e) {
        console.warn('無法清除暫存:', e);
      }

      const width = 600, height = 700;
      const left = (window.screen.width - width) / 2;
      const top = (window.screen.height - height) / 2;
      const returnUrl = encodeURIComponent(window.location.href);
      const url = `${CONFIG.stravaAuthUrl}?return_url=${returnUrl}`;

      authWindow = window.open(
        url,
        'strava_auth',
        `width=${width},height=${height},left=${left},top=${top},scrollbars=yes`
      );

      if (!authWindow) {
        window.location.href = url;
        return;
      }

      startPolling();
    }

    function startPolling() {
      pollingStartTime = Date.now();
      pollingTimer = setInterval(() => {
        if (Date.now() - pollingStartTime > CONFIG.pollingTimeout) {
          stopPolling();
          showMessage('error', '授權超時,請重試');
          updateStravaStatus(null);
          return;
        }

        if (authWindow && authWindow.closed) {
          stopPolling();
          const athlete = checkStoredData();
          if (!athlete) {
            showMessage('error', '授權已取消或未完成');
            updateStravaStatus(null);
          }
          return;
        }

        checkStoredData();
      }, CONFIG.pollingInterval);
    }

    function stopPolling() {
      if (pollingTimer) {
        clearInterval(pollingTimer);
        pollingTimer = null;
      }
      if (authWindow && !authWindow.closed) {
        authWindow.close();
      }
      authWindow = null;
    }

    function checkStoredData() {
      let tempData = null;
      try {
        tempData = localStorage.getItem(CONFIG.storageKey + '_temp');
      } catch (e) {
        console.warn('讀取暫存失敗:', e);
      }

      if (tempData) {
        try {
          const athlete = JSON.parse(tempData);
          localStorage.removeItem(CONFIG.storageKey + '_temp');
          stopPolling();
          fillFormWithStravaData(athlete);
          showMessage('success', 'Strava 授權成功!');
          return athlete;
        } catch (error) {
          console.error('解析 Strava 資料失敗:', error);
        }
      }
      return null;
    }

    // ✅ 修正: 加入發送取消授權請求到 webhook
    async function disconnectStrava() {
      if (!confirm('確定要取消 Strava 授權嗎?')) return;

      // 取得儲存的 access_token 和 athlete_id
      let accessToken = '';
      let athleteId = '';
      try {
        const savedData = localStorage.getItem(CONFIG.storageKey);
        if (savedData) {
          const athlete = JSON.parse(savedData);
          accessToken = athlete.access_token || '';
          athleteId = athlete.id || '';
        }
      } catch (e) {
        console.warn('讀取 access_token 失敗:', e);
      }

      // ✅ 移除 if 判斷,直接發送請求
      try {
        const response = await fetch(CONFIG.stravaCancelUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            access_token: accessToken,
            athlete_id: athleteId
          })
        });
        console.log('已發送取消授權請求到 webhook, Status:', response.status);
      } catch (e) {
        console.error('發送取消授權請求失敗:', e);
      }

      // 清除前端資料
      document.getElementById('strava_athlete_id').value = '';
      document.getElementById('strava_username').value = '';
      document.getElementById('strava_profile').value = '';

      try {
        localStorage.removeItem(CONFIG.storageKey);
        localStorage.removeItem(CONFIG.storageKey + '_temp');
      } catch (e) {
        console.warn('清除 localStorage 失敗:', e);
      }

      updateStravaStatus(null);
      showMessage('success', '已取消 Strava 授權');
    }


    window.addEventListener('message', function (event) {
      const isAllowedOrigin = event.origin && CONFIG.allowedOrigins.includes(event.origin);
      const isNullOriginSafeSuccess =
        event.origin === "null" &&
        event.data?.type === "STRAVA_AUTH_SUCCESS" &&
        event.data?.athlete?.id;

      if (!isAllowedOrigin && !isNullOriginSafeSuccess) {
        console.warn('收到來自未授權來源的訊息:', event.origin);
        return;
      }

      if (event.data.type === 'STRAVA_AUTH_SUCCESS' && event.data.athlete) {
        stopPolling();
        fillFormWithStravaData(event.data.athlete);
        showMessage('success', 'Strava 授權成功!');
      } else if (event.data.type === 'STRAVA_AUTH_ERROR') {
        stopPolling();
        showMessage('error', event.data.message || 'Strava 授權失敗');
        updateStravaStatus(null);
      }
    });

    function loadStravaDataFromURL() {
      const urlParams = new URLSearchParams(window.location.search);
      const dataStr = urlParams.get('data');

      if (dataStr) {
        try {
          const data = JSON.parse(decodeURIComponent(dataStr));
          fillFormWithStravaData(data);
          showMessage('success', 'Strava 授權成功!');
          window.history.replaceState({}, document.title, window.location.pathname);
          return;
        } catch (error) {
          console.error('解析 URL 資料失敗:', error);
        }
      }

      const athleteId = urlParams.get('athlete_id');
      if (athleteId) {
        const athlete = {
          id: athleteId,
          firstname: urlParams.get('firstname') || '',
          lastname: urlParams.get('lastname') || '',
          username: urlParams.get('username') || '',
          profile: urlParams.get('profile') || '',
          profile_medium: urlParams.get('profile_medium') || ''
        };
        fillFormWithStravaData(athlete);
        showMessage('success', 'Strava 授權成功!');
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const form = event.target;
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      if (!data.strava_athlete_id) {
        showMessage('error', '請先授權 Strava 帳號');
        return;
      }

      if (!data.name) {
        showMessage('error', '請填寫姓名');
        return;
      }

      await submitToBackend(data);
    }

    async function submitToBackend(data) {
      const submitBtn = document.getElementById('submitBtn');
      if (!submitBtn) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>提交中...';

      try {
        const response = await fetch(CONFIG.submitUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          const result = await response.json().catch(() => ({}));
          const params = new URLSearchParams({
            success: 'true',
            message: result.message || '報名成功!',
            registration_id: result.registration_id || data.strava_athlete_id || '',
            name: data.name || '',
            tcu_id: data.tcu_id || '',
            number: data.number || '',
            team: data.team || '',
            strava_athlete_id: data.strava_athlete_id || '',
            submitted_at: new Date().toLocaleString('zh-TW')
          });
          window.location.href = `/136result.html?${params.toString()}`;
          return;
        } else {
          const errorText = await response.text();
          let errorMessage = '提交失敗';

          try {
            const errorData = JSON.parse(errorText);
            errorMessage = errorData.message || errorData.error || errorMessage;
          } catch (e) {
            errorMessage = errorText || errorMessage;
          }

          throw new Error(errorMessage);
        }
      } catch (error) {
        console.error('提交錯誤:', error);
        showMessage('error', error.message || '提交失敗,請稍後再試');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '完成資料填寫';
      }
    }

    async function syncTCUData() {
      const tcuInput = document.getElementById('tcu_id');
      let tcuId = tcuInput.value.trim();

      if (!tcuId) {
        showMessage('error', '請先輸入 TCU-ID / 個人身份證ID');
        return;
      }

      tcuId = tcuId.toUpperCase();
      tcuInput.value = tcuId;

      const btn = event.target;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>同步中...';

      try {
        const response = await fetch(CONFIG.tcuSyncUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tcu_id: tcuId,
            strava_athlete_id: document.getElementById('strava_athlete_id').value || ''
          })
        });

        const result = await response.json().catch(() => ({}));

        if (result.success) {
          if (result.data) {
            if (result.data.tcu_id) {
              document.getElementById('tcu_id').value = result.data.tcu_id;
            }
            if (result.data.name) {
              document.getElementById('name').value = result.data.name;
            }
            if (result.data.team) {
              document.getElementById('team').value = result.data.team;
            }
          }
          showMessage('success', result.message || 'TCU 資料同步成功!');
        } else {
          showMessage('error', result.message || 'TCU 資料同步失敗');
        }
      } catch (error) {
        console.error('同步錯誤:', error);
        showMessage('error', '同步失敗,請稍後再試');
      } finally {
        btn.disabled = false;
        btn.textContent = '同步TCU個人資料';
      }
    }

    window.addEventListener('DOMContentLoaded', function () {
      loadStravaDataFromURL();
      loadFormState();

      // 從 localStorage 恢復完整的 Strava 資料
      try {
        const savedData = localStorage.getItem(CONFIG.storageKey);
        if (savedData && !document.getElementById('strava_athlete_id').value) {
          const athlete = JSON.parse(savedData);

          if (athlete?.id) {
            fillFormWithStravaData(athlete);
          }
        }
      } catch (error) {
        console.error('載入 localStorage 資料失敗:', error);
        localStorage.removeItem(CONFIG.storageKey);
      }
    });

    window.addEventListener('beforeunload', function () {
      if (pollingTimer) clearInterval(pollingTimer);
      if (authWindow && !authWindow.closed) authWindow.close();
    });
  </script>
</body>

</html>
